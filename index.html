<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Libercoop</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <style>
      body {
          margin: 0;
          padding: 0;
          font-family: sans-serif;
          background-color: #f0f0f0; /* Color de fondo de la web */
      }
      df-messenger {
        z-index: 999;
        position: fixed;
        --df-messenger-font-color: #000;
        --df-messenger-font-family: Google Sans;
        --df-messenger-chat-background: #f3f6fc;
        --df-messenger-message-user-background: #d3e3fd;
        --df-messenger-message-bot-background: #fff;
        bottom: 16px;
        right: 16px;
      }
    </style>
</head>
<body>

    <h1 style="text-align: center; margin-top: 50px;">Asistente Virtual Libercoop</h1>

    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <df-messenger
      project-id="chatbot-ia-477214"
      agent-id="a63d5aa5-964a-48da-be6d-3fe04ea8f7e3"
      language-code="es"
      max-query-length="-1"
      allow-feedback="all">
      <df-messenger-chat-bubble
        chat-title="Asistente Libercoop">
      </df-messenger-chat-bubble>
    </df-messenger>

    <!-- SCRIPT PARA INTERCEPTAR Y LIMPIAR LA BASURA DE VERTEX AI (BUG 02) -->
    <script>
      // ── 1. Intercepción de eventos: conservar sólo texto puro ──
      window.addEventListener('df-response-received', (event) => {
        const messages = event.detail && event.detail.messages;
        if (!messages) return;

        // Descartar rich cards, info cards, chips de citas; conservar sólo texto
        event.detail.messages = messages.filter(msg => msg.type === 'text');

        // Eliminar marcadores de cita inline: [1], [2], etc.
        event.detail.messages.forEach(msg => {
          if (msg.text) msg.text = msg.text.replace(/\[\d+\]/g, '').trim();
        });
      });

      // ── 2. Inyección de CSS en Shadow DOM para ocultar residuos visuales ──
      // df-messenger anida varios shadow roots; recorremos todos recursivamente.
      const _injected = new WeakSet();

      function _injectHideCSS(shadowRoot) {
        if (!shadowRoot || _injected.has(shadowRoot)) return;
        _injected.add(shadowRoot);

        const style = document.createElement('style');
        style.textContent = `
          df-info-card,
          [class*="grounding"],
          [class*="citation"],
          [class*="source-card"],
          [class*="snippet-card"],
          [class*="search-chip"] {
            display: none !important;
          }
        `;
        shadowRoot.appendChild(style);

        // Observar nuevos nodos que puedan aparecer más tarde (carga diferida)
        new MutationObserver(muts => {
          muts.forEach(m => m.addedNodes.forEach(n => _walkShadow(n)));
        }).observe(shadowRoot, { childList: true, subtree: true });
      }

      function _walkShadow(node) {
        if (!node || node.nodeType !== 1) return;
        if (node.shadowRoot) {
          _injectHideCSS(node.shadowRoot);
          node.shadowRoot.querySelectorAll('*').forEach(_walkShadow);
        }
      }

      customElements.whenDefined('df-messenger').then(() => {
        _walkShadow(document.querySelector('df-messenger'));
        // Re-recorrer cuando el panel del chat se abra por primera vez
        window.addEventListener('df-messenger-loaded', () => {
          _walkShadow(document.querySelector('df-messenger'));
        });
      });
    </script>

</body>
</html>

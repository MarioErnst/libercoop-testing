<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Libercoop</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <style>
      body {
          margin: 0;
          padding: 0;
          font-family: sans-serif;
          background-color: #f0f0f0; /* Color de fondo de la web */
      }
      df-messenger {
        z-index: 999;
        position: fixed;
        --df-messenger-font-color: #000;
        --df-messenger-font-family: Google Sans;
        --df-messenger-chat-background: #f3f6fc;
        --df-messenger-message-user-background: #d3e3fd;
        --df-messenger-message-bot-background: #fff;
        bottom: 16px;
        right: 16px;
      }
    </style>
</head>
<body>

    <h1 style="text-align: center; margin-top: 50px;">Asistente Virtual Libercoop</h1>

    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <df-messenger
      project-id="chatbot-ia-477214"
      agent-id="a63d5aa5-964a-48da-be6d-3fe04ea8f7e3"
      language-code="es"
      max-query-length="-1"
      allow-feedback="all">
      <df-messenger-chat-bubble
        chat-title="Asistente Libercoop">
      </df-messenger-chat-bubble>
    </df-messenger>

    <!-- SCRIPT FIX BUG 02: DESTRUCCION DE df-card EN SHADOW DOM -->
    <!-- SCRIPT FIX BUG 02: DESTRUCCION DE DATOS PAYLOAD -->
    <script>
      window.addEventListener('df-response-received', (event) => {
        if (!event.detail || !event.detail.messages) return;

        // 1. CÁMARA DE SEGURIDAD: Imprimir en consola lo que manda Google antes de limpiarlo
        console.log("Paquete interceptado:", JSON.parse(JSON.stringify(event.detail.messages)));

        // 2. FILTRO ULTRA AGRESIVO: Destruir cualquier tarjeta (payload) y dejar SOLO el texto
        event.detail.messages = event.detail.messages.filter(msg => {
          // Si el mensaje trae un 'payload' o 'richContent' (que es donde Google esconde los df-card), lo eliminamos
          if (msg.payload || msg.richContent) {
            return false;
          }
          // Si es un mensaje de texto puro, lo dejamos pasar
          return msg.text !== undefined;
        });

        // 3. LIMPIEZA DE NÚMEROS: Quitar los [1], [2] del texto que sí dejamos pasar
        event.detail.messages.forEach(msg => {
          if (msg.text && Array.isArray(msg.text.text)) {
            msg.text.text = msg.text.text.map(t => t.replace(/\[\d+\]/g, '').trim());
          }
        });
      });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Libercoop</title>
    <link rel="stylesheet" href="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/themes/df-messenger-default.css">
    <style>
      body {
          margin: 0;
          padding: 0;
          font-family: sans-serif;
          background-color: #f0f0f0; /* Color de fondo de la web */
      }
      df-messenger {
        z-index: 999;
        position: fixed;
        --df-messenger-font-color: #000;
        --df-messenger-font-family: Google Sans;
        --df-messenger-chat-background: #f3f6fc;
        --df-messenger-message-user-background: #d3e3fd;
        --df-messenger-message-bot-background: #fff;
        bottom: 16px;
        right: 16px;
      }
    </style>
</head>
<body>

    <h1 style="text-align: center; margin-top: 50px;">Asistente Virtual Libercoop</h1>

    <script src="https://www.gstatic.com/dialogflow-console/fast/df-messenger/prod/v1/df-messenger.js"></script>
    <df-messenger
      project-id="chatbot-ia-477214"
      agent-id="a63d5aa5-964a-48da-be6d-3fe04ea8f7e3"
      language-code="es"
      max-query-length="-1"
      allow-feedback="all">
      <df-messenger-chat-bubble
        chat-title="Asistente Libercoop">
      </df-messenger-chat-bubble>
    </df-messenger>

    <!-- SCRIPT FIX BUG 02: RADAR TERMINATOR (BARRIDO CONSTANTE) -->
    <script>
      // Este script funciona como un radar que escanea el chat cada medio segundo 
      // y oculta cualquier tarjeta (df-card) de los hipervínculos, sin importar dónde se esconda.
      setInterval(() => {
        function aniquilarTarjetas(nodo) {
          if (!nodo) return;

          // 1. Si encontramos al intruso (df-card), lo volvemos invisible
          if (nodo.tagName && nodo.tagName.toLowerCase() === 'df-card') {
            nodo.style.setProperty('display', 'none', 'important');
          }

          // 2. Si el nodo tiene un escudo de Google (Shadow Root), lo atravesamos
          if (nodo.shadowRoot) {
            aniquilarTarjetas(nodo.shadowRoot);
          }

          // 3. Revisamos a todos los hijos de este nodo recursivamente
          if (nodo.children) {
            for (let i = 0; i < nodo.children.length; i++) {
              aniquilarTarjetas(nodo.children[i]);
            }
          }
        }

        // Encendemos el radar apuntando al componente principal del chat
        const chatPrincipal = document.querySelector('df-messenger');
        if (chatPrincipal) {
          aniquilarTarjetas(chatPrincipal);
        }
      }, 500); // 500 milisegundos = medio segundo
    </script>

</body>
</html>
